<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <defs>
    <clipPath id="win">
      <rect x="60" y="10" width="80" height="80"/>
    </clipPath>
  </defs>

  <!-- Sinusoidal waveform — dark gray -->
  <path
    d="M 0,50
       C 14.6,28 25.4,28 40,50
       C 54.6,72 65.4,72 80,50
       C 94.6,28 105.4,28 120,50
       C 134.6,72 145.4,72 160,50
       C 174.6,28 185.4,28 200,50"
    fill="none" stroke="#3d4452" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Same waveform clipped to window — emerald green -->
  <path
    d="M 0,50
       C 14.6,28 25.4,28 40,50
       C 54.6,72 65.4,72 80,50
       C 94.6,28 105.4,28 120,50
       C 134.6,72 145.4,72 160,50
       C 174.6,28 185.4,28 200,50"
    fill="none" stroke="#10b981" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round"
    clip-path="url(#win)"/>

  <!-- Rolling window frame -->
  <rect x="60" y="10" width="80" height="80" rx="1"
        fill="none" stroke="#10b981" stroke-width="3"/>
</svg>
